# Homiko stage + prod + Grafana Loki
# cp .env.example .env && docker compose pull && docker compose up -d

name: homiko

services:
  postgres:
    image: postgres:17-bookworm
    container_name: homiko-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homiko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homiko}
      # Varsayılan DB; uygulama DB'leri init script ile eklenir (homiko-stage, homiko-prod).
      POSTGRES_DB: ${POSTGRES_DB:-homiko}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init-databases.sql:/docker-entrypoint-initdb.d/010-init-databases.sql:ro
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    networks:
      - homiko
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  homiko-prod:
    image: ikbalkazanc/homiko:prod
    container_name: homiko-prod
    restart: unless-stopped
    ports:
      - "8100:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/homiko-prod
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-homiko}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-homiko}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      logging.homiko/app: homiko
      logging.homiko/environment: prod
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - homiko

  homiko-stage:
    image: ikbalkazanc/homiko:stage
    container_name: homiko-stage
    restart: unless-stopped
    ports:
      - "8200:8080"
    environment:
      SPRING_PROFILES_ACTIVE: stage
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/homiko-stage
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-homiko}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-homiko}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      logging.homiko/app: homiko
      logging.homiko/environment: stage
      com.centurylinklabs.watchtower.enable: "true"
    networks:
      - homiko

  loki:
    image: grafana/loki:3.4.2
    container_name: homiko-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - homiko
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.4.2
    container_name: homiko-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./deploy/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - homiko

  grafana:
    image: grafana/grafana:11.6.0
    container_name: homiko-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - homiko

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: homiko-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"

networks:
  homiko:
    driver: bridge

volumes:
  postgres-data:
  loki-data:
  grafana-data:
  promtail-positions:

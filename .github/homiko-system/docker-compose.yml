# Homiko stage + prod + Grafana Loki
# cp .env.example .env && docker compose pull && docker compose up -d

name: homiko

services:
  homiko-prod:
    image: ikbalkazanc/homiko:prod
    container_name: homiko-prod
    restart: unless-stopped
    ports:
      - "8100:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    labels:
      logging.homiko/app: homiko
      logging.homiko/environment: prod
    networks:
      - homiko

  homiko-stage:
    image: ikbalkazanc/homiko:stage
    container_name: homiko-stage
    restart: unless-stopped
    ports:
      - "8200:8080"
    environment:
      SPRING_PROFILES_ACTIVE: stage
    labels:
      logging.homiko/app: homiko
      logging.homiko/environment: stage
    networks:
      - homiko

  loki:
    image: grafana/loki:3.4.2
    container_name: homiko-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - homiko
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.4.2
    container_name: homiko-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./deploy/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - homiko

  grafana:
    image: grafana/grafana:11.6.0
    container_name: homiko-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - homiko

networks:
  homiko:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
  promtail-positions:

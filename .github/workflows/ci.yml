# CI akışı:
# - push master: test → bootJar → Docker :stage (+ :sha) — otomatik
# - pull_request: yalnızca test
# - workflow_dispatch "Deploy to production": :stage → :prod retag — manuel (Actions sekmesi)
#
# Prod: Actions → CI → Run workflow → branch master → Deploy to production
# Repo: Settings → Environments → "production" → Required reviewers (isteğe bağlı onay)
name: CI

on:
  push:
  pull_request:
    branches: [main, master, stage]
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: "Promote current :stage image to :prod"
        type: boolean
        required: true
        default: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  IMAGE_NAME: homiko
  DOCKER_PLATFORMS: linux/arm64
  GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  test-and-build:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test (bootJar yalnızca master push)
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "master" ]; then
            ./gradlew test bootJar --no-daemon --build-cache
          else
            ./gradlew test --no-daemon --build-cache
          fi

      - name: Upload bootJar
        if: github.event_name == 'push' && github.ref_name == 'master'
        uses: actions/upload-artifact@v4
        with:
          name: boot-jar
          path: build/libs/*.jar
          retention-days: 1
          compression-level: 0
          if-no-files-found: error

  docker-publish-stage:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref_name == 'master'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - name: Checkout Dockerfile only
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: Dockerfile
          sparse-checkout-cone-mode: true

      - name: Download bootJar
        uses: actions/download-artifact@v4
        with:
          name: boot-jar

      - name: Prepare Docker context
        run: |
          JAR="$(ls -1 *.jar | head -n1)"
          cp "$JAR" app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ env.IMAGE_NAME }}:stage, :${{ github.sha }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          provenance: false
          sbom: false
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:stage
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish-prod:
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy_prod == true
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote stage image to prod (no rebuild)
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:prod" \
            "${IMAGE}:stage"

# CI: test (Gradle) → Docker stage (arm64, Pi 5) → prod retag (yeniden build yok).
# PR: yalnızca `./gradlew test` (bootJar ve Docker yok).
# Push master: bootJar artifact + tek platform imaj (linux/arm64).
#
# Pi 5 = ARM64. amd64 + QEMU ile çapraz derleme kaldırıldı; Docker job native arm64 runner kullanır.
# Repo: Settings → Environments → "production" → Required reviewers.
name: CI

on:
  push:
  pull_request:
    branches: [main, master, stage]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: homiko
  # Raspberry Pi 5 (64-bit) — yalnızca arm64
  DOCKER_PLATFORMS: linux/arm64
  GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test (bootJar yalnızca master push)
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "master" ]; then
            ./gradlew test bootJar --no-daemon --build-cache
          else
            ./gradlew test --no-daemon --build-cache
          fi

      - name: Upload bootJar
        if: github.event_name == 'push' && github.ref_name == 'master'
        uses: actions/upload-artifact@v4
        with:
          name: boot-jar
          path: build/libs/*.jar
          retention-days: 1
          compression-level: 0
          if-no-files-found: error

  docker-publish-stage:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref_name == 'master'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - name: Checkout Dockerfile only
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: Dockerfile
          sparse-checkout-cone-mode: true

      - name: Download bootJar
        uses: actions/download-artifact@v4
        with:
          name: boot-jar

      - name: Prepare Docker context
        run: |
          JAR="$(ls -1 *.jar | head -n1)"
          cp "$JAR" app.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ env.IMAGE_NAME }}:stage, :${{ github.sha }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          provenance: false
          sbom: false
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:stage
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  approval-gate:
    needs: docker-publish-stage
    if: github.event_name == 'push' && github.ref_name == 'master'
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 1440  # 24 saat onay bekleyebilir
    steps:
      - name: Manual Approval Required
        run: |
          echo "🛑 Stage image başarıyla oluşturuldu ve Docker Hub'a yüklendi."
          echo "📦 Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:stage"
          echo "🔍 Commit: ${{ github.sha }}"
          echo ""
          echo "⏳ Production'a promote etmek için manuel onay bekleniyor..."
          echo "✅ GitHub → Actions → Bu workflow → 'Review deployments' butonuna tıklayın."

  docker-publish-prod:
    needs: approval-gate
    if: github.event_name == 'push' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deployment approved
        run: |
          echo "✅ Production deployment onaylandı!"
          echo "🚀 Stage image production'a promote ediliyor..."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote stage image to prod (no rebuild)
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:prod" \
            "${IMAGE}:stage"
          echo "✅ Production image başarıyla oluşturuldu: ${IMAGE}:prod"

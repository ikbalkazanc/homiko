# CI: 3 ayrı job — test → stage (otomatik) → prod (production ortamı onayı).
# Repo: Settings → Environments → "production" → Required reviewers.
#
# "Skipped" ne zaman normaldir?
# - pull_request: yalnızca test-and-build çalışır (Docker job'ları push ile tetiklenir).
# - push, STAGE_BRANCH dışı bir dala yapıldıysa.
#
# Varsayılan staging dalı master. Ana dalınız main ise aşağıdaki iki `if` içindeki 'master' → 'main' yapın.
name: CI

on:
  push:
  pull_request:
    branches: [main, master, stage]

env:
  IMAGE_NAME: homiko

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew test --no-daemon

      - name: Build bootJar
        run: ./gradlew bootJar --no-daemon -x test

  docker-publish-stage:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ env.IMAGE_NAME }}:stage, :${{ github.sha }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:stage
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  docker-publish-prod:
    needs: docker-publish-stage
    if: github.event_name == 'push' && github.ref_name == 'master'
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ env.IMAGE_NAME }}:prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:prod
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
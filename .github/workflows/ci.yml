# CI: test + bootJar; :stage (push → stage branch); :prod (manual workflow_dispatch, main/master).
# Sıra: test-and-build → docker-publish-stage (push/stage) veya test-and-build → docker-publish-prod (manuel).
name: CI
on:
  push:
  pull_request:
    branches: [main, master, stage]
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: "homiko:prod imajını Docker Hub'a yükle (branch main veya master olmalı)"
        type: boolean
        default: false
        required: true
env:
  IMAGE_NAME: homiko
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Test
        run: ./gradlew test --no-daemon
      - name: Build bootJar
        run: ./gradlew bootJar --no-daemon -x test
  docker-publish-stage:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (${{ env.IMAGE_NAME }}:stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:stage
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
  docker-publish-prod:
    needs: test-and-build
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_prod == 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (${{ env.IMAGE_NAME }}:prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:prod
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}